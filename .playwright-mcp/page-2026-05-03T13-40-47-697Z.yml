        - paragraph [ref=e274]:
          - generic [ref=e276]: دايركت رفيقك الأمثل في السفر و السياحة ! نحن هنا لنجعل رحلتك ليست فقط ممكنة بل نضمن بأن تكون سهلة و ممتعة و خالية من أي تعقيدات سواء كنت تخطط لقضاء عطلة أو رحلة عمل. دايركت شـوف العـالـم ماذا يقدم تطبيق دايركت ؟ - استلام جواز العميل لاستخراج التأشيرة و القيام بجميع الإجراءات نيابة عنه من ثم تسليمه الجواز بعد الانتهاء من إصدار التأشيرة. - حجز الفنادق , من خلال أكثر من 2.5 مليون خيار للإقامة حول العالم و كما تحب. - حجز الطيران , نراهن على عدد الحلول المتاحة و أسعار التذاكر الأقل سعراً بالتواصل مع أكثر من 450 شركة طيران حول العالم. - خدمات مسـاندة و مصاحبة للمسافر "رخصة دولية – ترجمة مستندات – غيرها ..." - حلول الدراسة بالخارج " لغة إنجليزية – قبول جامعات - دراسة تخصصية" , وكلاء أعرق المعاهد العالمية مع أكثر من 1,500 خيار حول العالم.
