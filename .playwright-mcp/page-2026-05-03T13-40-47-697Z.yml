                  - paragraph [ref=e383]: نجمة وحده وكثيره بعد لان انا رحت لندن مع داريكت واتفقت معهم بالمعهد وسجلوني فيه وبرضوا حجزوا لي تذاكر طبعاً انا رايحه مع اخوي ف كلنا نفس التسجيل.. اتفاجئ بعد 3 شهور دراسة ب اخر اسبوع انا استلم شهادتي واخوي لا ! طلع فيه مشكلة بالتسجيل وبسبب اهمال دايركت بالمتابعه معهم صار فيه لاخوي اسبوع زياده حضور والمشكلة الادهى انو رحلتنا من بكرا وهم عندهم علم بالرحله .. كلمنا دايركت وقالوا حنا بنتعامل مع المشكلة ورجعنا السعودية .. هل اخوي استلم الشهادة ؟ لا طبعاً مااستلمها لحد الان مع العلم دافعة 16 الف ريال لهم وبسببهم ماستلمها وضاع جهد 3 شهورOnly one star — and that’s even too much. I went to London through Direct, and they handled everything with the institute — they registered me and also booked our tickets. I traveled with my brother, so we had the same registration.After three months of studying, during the last week, I was surprised that I received my certificate but my brother didn’t! It turned out there was a registration issue, and because of Direct’s negligence in following up with the institute, my brother had to attend an extra week.The worst part is that our flight was the next day — and Direct knew about it. We contacted them, and they said they were handling the issue. We returned to Saudi Arabia, but did my brother ever receive his certificate? Of course not.I paid them 16,000 SAR, and because of their carelessness, he never got his certificate, and three months of effort went to waste.
